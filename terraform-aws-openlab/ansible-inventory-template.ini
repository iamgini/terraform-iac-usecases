# AAP Ansible Inventory Template
# Copy this to your jumpserver and update with actual private IPs from terraform output

[automationcontroller]
aap-ac1 ansible_host=REPLACE_WITH_PRIVATE_IP
aap-ac2 ansible_host=REPLACE_WITH_PRIVATE_IP

[automationgateway]
aap-gw1 ansible_host=REPLACE_WITH_PRIVATE_IP
aap-gw2 ansible_host=REPLACE_WITH_PRIVATE_IP

[automationhub]
aap-hub1 ansible_host=REPLACE_WITH_PRIVATE_IP
aap-hub2 ansible_host=REPLACE_WITH_PRIVATE_IP

[automationeda]
aap-eda1 ansible_host=REPLACE_WITH_PRIVATE_IP
aap-eda2 ansible_host=REPLACE_WITH_PRIVATE_IP

[database]
aap-db1 ansible_host=REPLACE_WITH_PRIVATE_IP

[execution_nodes]
aap-en1 ansible_host=REPLACE_WITH_PRIVATE_IP
aap-en2 ansible_host=REPLACE_WITH_PRIVATE_IP

[all:vars]
ansible_user=ec2-user
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_become=true

# EFS Configuration
# Mount EFS on hub nodes: terraform output efs_dns_name
# efs_dns_name=REPLACE_WITH_EFS_DNS_NAME
# efs_mount_point=/mnt/hub-storage

# Load Balancer Configuration
# External access via ALB: terraform output alb_dns_name
# alb_dns_name=REPLACE_WITH_ALB_DNS_NAME

# AAP Installation Variables
# registry_url='registry.redhat.io'
# registry_username='REPLACE_WITH_RHN_USERNAME'
# registry_password='REPLACE_WITH_RHN_PASSWORD'

# PostgreSQL Configuration (for external DB node)
# pg_host=aap-db1
# pg_port=5432
# pg_database=awx
# pg_username=awx
# pg_password='REPLACE_WITH_SECURE_PASSWORD'

# Redis Configuration
# redis_mode=standalone

# Admin Credentials
# admin_password='REPLACE_WITH_SECURE_PASSWORD'
# pg_admin_password='REPLACE_WITH_SECURE_PASSWORD'

# SSL/TLS
# web_server_ssl_cert=/path/to/cert.pem
# web_server_ssl_key=/path/to/key.pem

# Notes:
# 1. Get private IPs: terraform output aap_ec2_instances
# 2. Get EFS DNS: terraform output efs_dns_name
# 3. Get ALB DNS: terraform output alb_dns_name
# 4. Copy your SSH private key to jumpserver
# 5. Ensure all AAP nodes are reachable from jumpserver
# 6. Mount EFS on hub nodes before running AAP installer
